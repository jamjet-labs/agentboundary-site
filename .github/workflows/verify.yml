name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Resolve spec ref
        id: specref
        run: |
          # Use the latest published release if one exists, otherwise main.
          # `gh api` exits 0 even on 404 with a JSON error body, so detect
          # by HTTP status explicitly.
          REF="main"
          STATUS=$(gh api -i repos/jamjet-labs/agentboundary/releases/latest 2>/dev/null \
            | head -1 | awk '{print $2}' || echo "")
          if [ "$STATUS" = "200" ]; then
            REF=$(gh api repos/jamjet-labs/agentboundary/releases/latest --jq '.tag_name')
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Spec ref resolved to: $REF (release-latest status was $STATUS)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout spec at resolved ref
        uses: actions/checkout@v4
        with:
          repository: jamjet-labs/agentboundary
          ref: ${{ steps.specref.outputs.ref }}
          path: agentboundary

      - name: Move spec sibling
        run: |
          # Site expects ../agentboundary; restructure to match.
          mkdir -p ../agentboundary
          rsync -a agentboundary/ ../agentboundary/
          rm -rf agentboundary

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from package.json#packageManager — do NOT set it here
        # or pnpm/action-setup errors with ERR_PNPM_BAD_PM_VERSION.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Sync spec + verify schema identity
        run: pnpm prebuild

      - name: Build
        run: pnpm build

      - name: Confirm schema served byte-identical
        run: |
          diff dist/schemas/action-receipt-v0.1.json ../agentboundary/docs/schemas/action-receipt-v0.1.json
          echo "schema byte-identical OK"

      - name: Confirm hero pages render
        run: |
          for path in index.html spec/v0.1/index.html threat-model/index.html owasp-mapping/index.html 404.html; do
            test -s "dist/$path" || { echo "missing $path"; exit 1; }
          done
          echo "all hero+spec pages rendered"

      - name: Confirm $id host
        run: |
          jq -r '.["$id"]' dist/schemas/action-receipt-v0.1.json | tee /tmp/sid
          grep -q "agentboundary.jamjet.dev" /tmp/sid

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=agentboundary-site --branch=main
